<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Jersey Canna Deals">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#56d364"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0b429"/>
      <stop offset="1" stop-color="#d29922"/>
    </linearGradient>
    <path id="lf" d="M0 0 C -7 -18 -4 -38 0 -50 C 4 -38 7 -18 0 0 Z"/>
  </defs>
  <!-- badge -->
  <rect x="3" y="3" width="94" height="94" rx="23" fill="#0d1117" stroke="#d29922" stroke-width="2.5"/>
  <!-- price tag accent (top-right) -->
  <g transform="translate(70 30) rotate(45)">
    <rect x="-11" y="-11" width="22" height="22" rx="4" fill="url(#tag)"/>
    <circle cx="-5" cy="-5" r="2.4" fill="#0d1117"/>
  </g>
  <!-- cannabis leaf -->
  <g transform="translate(47 82)" fill="url(#leaf)">
    <use href="#lf" transform="rotate(0)"/>
    <use href="#lf" transform="rotate(27) scale(0.9)"/>
    <use href="#lf" transform="rotate(-27) scale(0.9)"/>
    <use href="#lf" transform="rotate(54) scale(0.74)"/>
    <use href="#lf" transform="rotate(-54) scale(0.74)"/>
    <use href="#lf" transform="rotate(80) scale(0.52)"/>
    <use href="#lf" transform="rotate(-80) scale(0.52)"/>
  </g>
  <rect x="46" y="82" width="2" height="9" rx="1" fill="#2ea043"/>
</svg>
